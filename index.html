document.getElementById('pwa-manifest').href=URL.createObjectURL(mBlob);
// SW
if('serviceWorker' in navigator){const swB=new Blob([`self.addEventListener('install',e=>self.skipWaiting());self.addEventListener('activate',e=>clients.claim());self.addEventListener('fetch',e=>e.respondWith(caches.match(e.request).then(r=>r||fetch(e.request))));`],{type:'application/javascript'});navigator.serviceWorker.register(URL.createObjectURL(swB),{scope:'./'}).catch(()=>{});}
// Install prompt
let _dp=null;window.addEventListener('beforeinstallprompt',e=>{e.preventDefault();_dp=e;});
window.installPWA=()=>{if(_dp){_dp.prompt();_dp.userChoice.then(()=>{_dp=null;});}};
</script>
<script>
const html=htm.bind(React.createElement);
const {useState,useEffect,useRef,useCallback,useMemo}=React;

// ── CONSTANTES ──────────────────────────────────────────────────
const C={bg:'#06090f',s1:'#0b1525',s2:'#0f1e38',s3:'#152545',b:'#1a3557',ac:'#00c8ff',g:'#00e888',w:'#ffaa00',d:'#ff3366',t:'#c8e0f4',m:'#3d6b8a',t2:'#7a9ab8'};
const TT={amoniaco:{l:'Amoniaco',h:9,temp:-30,c:'#00e888'},freon:{l:'Freón',h:13,temp:-18,c:'#00c8ff'}};
const SHIFTS=[{id:'manana',l:'Mañana',c:'#ffaa00'},{id:'tarde',l:'Tarde',c:'#00c8ff'},{id:'noche',l:'Noche',c:'#aa88ff'}];
const MAX_OUT=60;
const CACHE_KEY='fc_v4';const CFG_KEY='fc_cfg_v2';

// ── HELPERS ──────────────────────────────────────────────────────
const gid=()=>Date.now().toString(36)+Math.random().toString(36).slice(2,5);
const elp=(ms)=>{if(!ms||ms<=0)return'00:00:00';const s=Math.floor(ms/1000);return[Math.floor(s/3600),Math.floor(s%3600/60),s%60].map(v=>String(v).padStart(2,'0')).join(':')};
const elpS=(ms)=>{if(!ms||ms<=0)return'0min';const m=Math.floor(ms/60000);return m<60?`${m}min`:`${Math.floor(m/60)}h ${m%60}min`};
const pct=(a,b)=>b===0?0:Math.min(100,Math.round(a/b*100));
const tcol=(el,h)=>{const p=pct(el,(h||1)*3600e3);return p>=100?C.d:p>=80?C.w:p>=50?'#ffdd00':C.g};
const ocol=(ms,max)=>{const m=ms/60000;return m>=max?C.d:m>=max*.7?C.w:m>=max*.4?'#ffdd00':C.g};
const shift=()=>{const h=new Date().getHours();return h>=6&&h<14?'manana':h>=14&&h<22?'tarde':'noche'};
const shiftOf=(ts)=>{const h=new Date(ts).getHours();return h>=6&&h<14?'manana':h>=14&&h<22?'tarde':'noche'};
const calcLbs=(u,w,unit)=>Math.round(+u*(unit==='kg'?+w*2.20462:+w)*100)/100;
const fmt=(d)=>d?new Date(d).toLocaleString('es-EC'):'—';
const fmtT=(d)=>d?new Date(d).toLocaleTimeString('es-EC',{hour:'2-digit',minute:'2-digit'}):'—';

const saveCache=(d)=>{try{localStorage.setItem(CACHE_KEY,JSON.stringify({...d,at:Date.now()}));}catch{}};
const loadCache=()=>{try{return JSON.parse(localStorage.getItem(CACHE_KEY)||'{}')}catch{return{}}};
const saveCfg=(c)=>{try{localStorage.setItem(CFG_KEY,JSON.stringify(c));}catch{}};
const loadCfg=()=>{try{return JSON.parse(localStorage.getItem(CFG_KEY)||'{}')}catch{return{}}};

// ── DATOS DEFAULT ────────────────────────────────────────────────
const N=Date.now();

  {id:'u4',name:'Pedro Reyes',email:'pedro@planta.com',password:'op123',role:'operador',cargo:'Operador de Túneles',phone:'5930976543210'},
  {id:'u5',name:'Ana Suárez',email:'ana@planta.com',password:'sup123',role:'supervisor',cargo:'Supervisora Nocturna',phone:'5930965432109'},
];
const DEF_TUNNELS=[
  {id:'t1',name:'Túnel Amoniaco 1',type:'amoniaco',capacityCoches:8,targetTemp:-30,checkIntervalMin:120,targetTimeHours:9,color:'#00e888'},

  {id:'c1',number:'001',productName:'Camarones',unitType:'caja',units:120,weightPerUnit:4,weightUnit:'lbs',totalLbs:480,status:'libre',tunnelId:null,productLoadTime:N-45*60000,entryTime:null,exitTime:null,ciclos:3,lastProduct:null},

  {id:'c3',number:'003',productName:'Camarones',unitType:'caja',units:200,weightPerUnit:4,weightUnit:'lbs',totalLbs:800,status:'en-tunel',tunnelId:'t1',productLoadTime:N-5*3600000,entryTime:N-3600000,exitTime:null,ciclos:5,lastProduct:null},
  {id:'c4',number:'004',productName:'',unitType:'caja',units:0,weightPerUnit:4,weightUnit:'lbs',totalLbs:0,status:'libre',tunnelId:null,productLoadTime:null,entryTime:null,exitTime:null,ciclos:0,lastProduct:null},
  {id:'c5',number:'005',productName:'Langostinos',unitType:'caja',units:175,weightPerUnit:5,weightUnit:'lbs',totalLbs:875,status:'en-tunel',tunnelId:'t2',productLoadTime:N-7*3600000,entryTime:N-5400000,exitTime:null,ciclos:12,lastProduct:null},
  {id:'c6',number:'006',productName:'Camarones',unitType:'caja',units:90,weightPerUnit:4,weightUnit:'lbs',totalLbs:360,status:'masterizando',tunnelId:null,productLoadTime:N-15*3600000,entryTime:N-12*3600000,exitTime:N-1800000,masterTime:N-1800000,ciclos:9,lastProduct:null},
  {id:'c7',number:'007',productName:'Calamar',unitType:'funda',units:145,weightPerUnit:2,weightUnit:'kg',totalLbs:640,status:'masterizando',tunnelId:null,productLoadTime:N-18*3600000,entryTime:N-16*3600000,exitTime:N-3600000,masterTime:N-3600000,ciclos:4,lastProduct:null},
  {id:'c8',number:'008',productName:'Tilapia',unitType:'caja',units:60,weightPerUnit:8,weightUnit:'lbs',totalLbs:480,status:'en-tunel',tunnelId:'t3',productLoadTime:N-12*3600000,entryTime:N-10800000,exitTime:null,ciclos:6,lastProduct:null},
];
const PRODS=[
  {name:'Camarones',unitType:'caja',weightPerUnit:4,weightUnit:'lbs'},
  {name:'Langostinos',unitType:'caja',weightPerUnit:5,weightUnit:'lbs'},
  {name:'Pescado',unitType:'caja',weightPerUnit:10,weightUnit:'kg'},
  {name:'Tilapia',unitType:'caja',weightPerUnit:8,weightUnit:'lbs'},

// ── MAPEO DESDE SHEETS ────────────────────────────────────────────
function mapCoches(rows){
  return rows.filter(r=>r[0]).map(r=>({
    id:String(r[0]),number:String(r[1]),status:r[2]||'libre',
    productName:r[3]||'',unitType:r[4]||'caja',
    units:+r[5]||0,weightPerUnit:+r[6]||0,weightUnit:r[7]||'lbs',
    totalLbs:+r[8]||0,lbs:+r[8]||0,cajetas:+r[5]||0,
    tunnelId:r[9]||null,tunnelName:r[10]||'',ciclos:+r[11]||0,
    productLoadTime:r[12]?new Date(String(r[12])).getTime()||null:null,
    entryTime:r[13]?new Date(String(r[13])).getTime()||null:null,
    exitTime:r[14]?new Date(String(r[14])).getTime()||null:null,
    masterTime:null,lastProduct:null,
  }));
}
function mapTuneles(rows){
  return rows.filter(r=>r[0]).map(r=>({
    id:String(r[0]),name:r[1]||'',type:r[2]||'amoniaco',
    capacityCoches:+r[3]||8,capacityLbs:+r[4]||5000,
    targetTemp:+r[5]||-30,checkIntervalMin:+r[6]||120,
    targetTimeHours:+r[7]||9,color:r[8]||'#00e888',
  }));
}
function mapHistorial(rows){
  return rows.filter(r=>r[0]).map(r=>({
    id:String(r[0]),number:r[1]||'',
    productName:r[2]||'',unitType:r[3]||'caja',
    units:+r[4]||0,weightPerUnit:+r[5]||0,weightUnit:r[6]||'lbs',totalLbs:+r[7]||0,
    tunnelId:r[8]||'',tunnelName:r[9]||'',tunnelType:r[10]||'',
    productLoadTime:r[11]?new Date(String(r[11])).getTime():null,
    entryTime:r[12]?new Date(String(r[12])).getTime():null,
    exitTime:r[13]?new Date(String(r[13])).getTime():null,
    outsideMin:+r[14]||0,horasEnTunel:+r[15]||0,
    shift:r[16]||'',userName:r[17]||'',
  }));
}

// ── UI PRIMITIVOS ─────────────────────────────────────────────────
function Btn({children,onClick,color,disabled=false,sm=false,full=false,style={}}) {
  const c=color||C.ac;
  return html`<button onClick=${onClick} disabled=${disabled}
    style=${{...{background:`${c}18`,border:`1px solid ${c}50`,color:disabled?C.m:c,
    padding:sm?'4px 10px':'7px 16px',borderRadius:6,cursor:disabled?'not-allowed':'pointer',
    fontSize:sm?10:12,fontWeight:600,width:full?'100%':'auto',opacity:disabled?.5:1,
    transition:'all .15s'},...style}}>${children}</button>`;
}
function Tag({children,color}){
  return html`<span style=${{background:`${color||C.ac}18`,border:`1px solid ${color||C.ac}40`,
    color:color||C.ac,padding:'1px 7px',borderRadius:10,fontSize:9,fontWeight:600,whiteSpace:'nowrap'}}>
    ${children}</span>`;
}
function Card({children,style={}}){
  return html`<div style=${{background:C.s1,border:`1px solid ${C.b}`,borderRadius:10,padding:14,...style}} class="fade">${children}</div>`;
}
function Modal({title,children,onClose,width=480}){
  useEffect(()=>{document.body.style.overflow='hidden';return()=>{document.body.style.overflow=''}},[]);
  return html`<div style=${{position:'fixed',inset:0,background:'#000c',zIndex:1000,display:'flex',alignItems:'center',justifyContent:'center',padding:12}}
    onClick=${e=>e.target===e.currentTarget&&onClose()}>
    <div style=${{background:C.s1,border:`1px solid ${C.b}`,borderRadius:12,padding:20,width:'100%',maxWidth:width,maxHeight:'92vh',overflowY:'auto'}} class="fade">
      <div style=${{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:16}}>
        <div style=${{fontFamily:'Orbitron,monospace',fontSize:12,color:C.ac,fontWeight:700}}>${title}</div>
        <button onClick=${onClose} style=${{background:'none',border:'none',color:C.m,cursor:'pointer',fontSize:18,padding:'0 4px'}}>✕</button>
      </div>
      ${children}
    </div>
  </div>`;
}
function Fld({label,value,onChange,type='text',placeholder='',options=null,rows=0}){
  const s={width:'100%',background:C.s3,border:`1px solid ${C.b}`,borderRadius:6,padding:'8px 10px',color:C.t,fontSize:12,marginBottom:10};
  return html`<div>
    ${label&&html`<div style=${{fontSize:9,color:C.m,marginBottom:4,textTransform:'uppercase',letterSpacing:.8}}>${label}</div>`}
    ${options?html`<select value=${value} onChange=${e=>onChange(e.target.value)} style=${s}>
      ${options.map(o=>html`<option key=${o.v} value=${o.v}>${o.l}</option>`)}
    </select>`:rows>0?html`<textarea rows=${rows} value=${value} onChange=${e=>onChange(e.target.value)} placeholder=${placeholder} style=${{...s,resize:'vertical'}}/>`:html`<input type=${type} value=${value} onChange=${e=>onChange(e.target.value)} placeholder=${placeholder} style=${s}/>`}
  </div>`;
}
function Spin(){return html`<span class="spin" style=${{display:'inline-block',fontSize:14}}>⟳</span>`;}

// ── COCHE CARD ────────────────────────────────────────────────────
function CocheCard({c,tunnels,inTunnel=false,dragging,setDragging,setDragOver,markReady,setFree,sendToMaster,now}){
  const t=tunnels.find(x=>x.id===c.tunnelId);
  const el=c.entryTime?now-c.entryTime:0;
  const prog=t?pct(el,t.targetTimeHours*3600e3):0;
  const tc=inTunnel?tcol(el,t?.targetTimeHours):C.t2;
  const outsMs=c.productLoadTime&&c.status==='libre'?now-c.productLoadTime:
               c.productLoadTime&&c.entryTime&&c.status!=='libre'?c.entryTime-c.productLoadTime:0;
  const oc=outsMs>0?ocol(outsMs,MAX_OUT):C.m;
  const over=outsMs>=MAX_OUT*60000&&c.status==='libre';
  const units=c.units||c.cajetas||0;
  const lbs=c.totalLbs||c.lbs||0;
  const uLabel=c.unitType==='funda'?'fundas':'cajas';
  const uPct=Math.min(100,pct(units,250));

  return html`<div draggable=${true}
    onDragStart=${()=>setDragging(c)}
    onDragEnd=${()=>{setDragging(null);setDragOver(null);}}
    style=${{background:C.s3,border:`1px solid ${over?C.d:prog>=100?C.d:inTunnel?tc+'50':C.b}`,
      borderRadius:8,padding:9,cursor:'grab',userSelect:'none',
      opacity:dragging?.id===c.id?.4:1,
      boxShadow:over?`0 0 8px ${C.d}50`:'none',transition:'border-color .2s'}}>
    <div style=${{display:'flex',justifyContent:'space-between',alignItems:'flex-start',marginBottom:3}}>
      <span style=${{fontFamily:'Orbitron,monospace',fontWeight:700,fontSize:12,color:C.t}}>#${c.number}</span>
      ${inTunnel?html`<${Tag} color=${tc}>${prog>=100?'✅ LISTO':'En Túnel'}</${Tag}>`:
        over?html`<${Tag} color=${C.d}>⚠ URGENTE</${Tag}>`:
        html`<${Tag} color=${C.t2}>Libre</${Tag}>`}
    </div>
    ${c.productName&&html`<div style=${{fontSize:10,color:C.t2,marginBottom:4}}>${c.productName}</div>`}
    ${units>0&&html`<div>
      <div style=${{display:'flex',justifyContent:'space-between',fontSize:10,marginBottom:2}}>
        <span style=${{color:C.ac,fontWeight:600}}>📦 ${units} ${uLabel}</span>
        <span style=${{color:C.g,fontWeight:700,fontFamily:'Orbitron,monospace'}}>${lbs.toLocaleString()} lbs</span>
      </div>
      <div style=${{background:C.s2,borderRadius:2,height:4,marginBottom:2}}>
        <div style=${{background:uPct>80?C.w:C.ac,borderRadius:2,height:'100%',width:`${uPct}%`}}/>
      </div>
      <div style=${{fontSize:9,color:C.m,marginBottom:4}}>${c.weightPerUnit}${c.weightUnit}/${c.unitType==='funda'?'funda':'caja'}</div>
    </div>`}
    ${outsMs>0&&html`<div style=${{background:`${oc}15`,border:`1px solid ${oc}30`,borderRadius:5,padding:'4px 7px',marginBottom:4}}>
      <div style=${{display:'flex',justifyContent:'space-between',alignItems:'center'}}>
        <span style=${{fontSize:9,color:oc,fontWeight:600}}>${c.status==='libre'?'⏱ AFUERA':'⏱ Afuera antes'}</span>
        <span style=${{fontSize:10,color:oc,fontFamily:'Orbitron,monospace',fontWeight:700}}>${elpS(c.status==='libre'?now-c.productLoadTime:outsMs)}</span>
      </div>
      ${c.status==='libre'&&html`<div style=${{background:C.s2,borderRadius:2,height:3,marginTop:2}}>
        <div style=${{background:oc,borderRadius:2,height:'100%',width:`${Math.min(100,pct(outsMs,MAX_OUT*60000))}%`}}/>
      </div>`}
    </div>`}
    ${inTunnel&&html`<div>
      <div style=${{display:'flex',justifyContent:'space-between',marginBottom:2}}>
        <span style=${{fontSize:9,color:C.m}}>🧊 EN TÚNEL</span>
        <span style=${{fontSize:10,color:tc,fontFamily:'Orbitron,monospace',fontWeight:700}}>${elp(el)}</span>
      </div>
      <div style=${{background:C.s2,borderRadius:2,height:3,marginBottom:6}}>
        <div style=${{background:tc,borderRadius:2,height:'100%',width:`${Math.min(100,prog)}%`,transition:'width 1s'}}/>
      </div>
      <div style=${{display:'flex',gap:4}}>
        <${Btn} sm=${true} color=${C.g} onClick=${e=>{e.stopPropagation();markReady(c.id);}}>✓ Listo</${Btn}>
        <${Btn} sm=${true} color=${C.m} onClick=${e=>{e.stopPropagation();setFree(c.id);}}>↩</${Btn}>
      </div>
    </div>`}
    ${c.status==='listo'&&html`<div style=${{display:'flex',gap:4,marginTop:4}}>
      <${Btn} sm=${true} color=${'#aa88ff'} onClick=${e=>{e.stopPropagation();sendToMaster(c.id);}}>🔄 Masterizar</${Btn}>
      <${Btn} sm=${true} color=${C.m} onClick=${e=>{e.stopPropagation();setFree(c.id);}}>↩</${Btn}>
    </div>`}
  </div>`;
}

// ── MODALES ──────────────────────────────────────────────────────
function CargaRapidaModal({coche,onSave,onClose}){
  const def=PRODS.find(p=>p.name===coche.productName)||PRODS[0];
  const lp=coche.lastProduct;
  const [f,setF]=useState({
    productName:lp?.productName||coche.productName||def.name,
    unitType:lp?.unitType||coche.unitType||def.unitType,
    units:0,
    weightPerUnit:lp?.weightPerUnit||coche.weightPerUnit||def.weightPerUnit,
    weightUnit:lp?.weightUnit||coche.weightUnit||def.weightUnit,
  });
  const s=(k,v)=>setF(p=>({...p,[k]:v}));
  const lbs=calcLbs(f.units,f.weightPerUnit,f.weightUnit);
  const pickP=(name)=>{const p=PRODS.find(x=>x.name===name);if(p)setF(prev=>({...prev,productName:p.name,unitType:p.unitType,weightPerUnit:p.weightPerUnit,weightUnit:p.weightUnit}));else s('productName',name);};
  const save=()=>{if(!+f.units)return;onSave({...coche,...f,units:+f.units,weightPerUnit:+f.weightPerUnit,totalLbs:lbs,lbs,cajetas:+f.units,productLoadTime:Date.now(),status:'libre'});onClose();};

  return html`<${Modal} title="⚡ Carga Rápida — Coche #${coche.number}" onClose=${onClose}>
    <div style=${{marginBottom:12}}>
      <div style=${{fontSize:9,color:C.m,marginBottom:6,textTransform:'uppercase',letterSpacing:.8}}>Producto</div>
      <div style=${{display:'flex',flexWrap:'wrap',gap:5}}>
        ${PRODS.map(p=>html`<button key=${p.name} onClick=${()=>pickP(p.name)}
          style=${{padding:'5px 11px',borderRadius:14,border:`1px solid ${f.productName===p.name?C.ac:C.b}`,
          background:f.productName===p.name?`${C.ac}20`:C.s3,color:f.productName===p.name?C.ac:C.t2,cursor:'pointer',fontSize:11}}>${p.name}</button>`)}
      </div>
    </div>

function App(){
  const cache=loadCache();
  const cfg=loadCfg();
  const [view,setView]=useState('login');
  const [user,setUser]=useState(null);
  const [users,setUsers]=useState(DEF_USERS);
  const [tunnels,setTunnels]=useState(cache.tunnels||DEF_TUNNELS);
  const [coches,setCoches]=useState(cache.coches||DEF_COCHES);
  const [tempLogs,setTempLogs]=useState([]);
  const [history,setHistory]=useState(cache.history||[]);
  const [alarms,setAlarms]=useState([]);
  const [config,setConfig]=useState({scriptUrl:'',ntfyTopic:'',...cfg});
  const [lEmail,setLEmail]=useState('');
  const [lPass,setLPass]=useState('');
  const [lErr,setLErr]=useState('');
  const [syncing,setSyncing]=useState(false);
  const [syncMsg,setSyncMsg]=useState('');
  const [online,setOnline]=useState(navigator.onLine);
  const [now,setNow]=useState(Date.now());
  const [dragging,setDragging]=useState(null);
  const [dragOver,setDragOver]=useState(null);
  const [showCarga,setShowCarga]=useState(null);
  const [showCocheForm,setShowCocheForm]=useState(false);
  const [editCoche,setEditCoche]=useState(null);
  const [showBatch,setShowBatch]=useState(null);
  const [showVerif,setShowVerif]=useState(null);
  const [showTunnelForm,setShowTunnelForm]=useState(false);
  const [editTunnel,setEditTunnel]=useState(null);
  const [aiMsgs,setAiMsgs]=useState([{role:'assistant',content:'¡Hola! Soy tu asistente de túneles. Pregúntame sobre el estado actual, temperaturas, coches o alarmas.'}]);
  const [aiInput,setAiInput]=useState('');
  const [aiLoading,setAiLoading]=useState(false);
  const [selTunnel,setSelTunnel]=useState(null);
  const [showTempForm,setShowTempForm]=useState(false);
  const aiEnd=useRef(null);
  const syncTimer=useRef(null);
  const cochesRef=useRef(coches);
  const tunnelsRef=useRef(tunnels);
  const alarmsRef=useRef(alarms);
  const cfgRef=useRef(config);

  // Ocultar splash apenas React monta
  useEffect(()=>{
    const el=document.getElementById('splash');
    if(el)el.classList.add('hide');
  },[]);

  useEffect(()=>{cochesRef.current=coches;},[coches]);
  useEffect(()=>{tunnelsRef.current=tunnels;},[tunnels]);
  useEffect(()=>{alarmsRef.current=alarms;},[alarms]);
  useEffect(()=>{cfgRef.current=config;saveCfg(config);},[config]);
  useEffect(()=>{aiEnd.current?.scrollIntoView({behavior:'smooth'});},[aiMsgs]);

  // Timer — solo updates display cada 10s (no cada 1s)
  useEffect(()=>{
    const iv=setInterval(()=>setNow(Date.now()),10000);
    return()=>clearInterval(iv);
  },[]);

  // Alarmas — cada 60s usando refs
  useEffect(()=>{
    const check=()=>{
      const n=Date.now();const na=[];
      cochesRef.current.forEach(c=>{
        if(c.status==='libre'&&c.productLoadTime){
          const ms=n-c.productLoadTime;
          if(ms>=MAX_OUT*60000&&!alarmsRef.current.some(a=>a.cocheId===c.id&&a.type==='outside-alert'&&!a.ack))
            na.push({id:gid(),type:'outside-alert',tunnelId:null,cocheId:c.id,msg:`🚨 Coche #${c.number} lleva ${elpS(ms)} AFUERA`,createdAt:n,ack:false});
        }
        if(c.status!=='en-tunel'||!c.entryTime)return;
        const t=tunnelsRef.current.find(x=>x.id===c.tunnelId);if(!t)return;
        const el=n-c.entryTime;
        if(el>=t.targetTimeHours*3600e3&&!alarmsRef.current.some(a=>a.cocheId===c.id&&a.type==='product-ready'&&!a.ack))
          na.push({id:gid(),type:'product-ready',tunnelId:t.id,cocheId:c.id,msg:`✅ LISTO Coche #${c.number} — ${t.name}`,createdAt:n,ack:false});
      });
      if(na.length){setAlarms(p=>[...p,...na]);na.forEach(a=>{fireNotif(a);});}
    };
    const iv=setInterval(check,60000);
    return()=>clearInterval(iv);
  },[]);

  // Online/offline
  useEffect(()=>{
    const on=()=>setOnline(true);const off=()=>setOnline(false);
    window.addEventListener('online',on);window.addEventListener('offline',off);
    return()=>{window.removeEventListener('online',on);window.removeEventListener('offline',off);};
  },[]);

  // Auto-detect script URL
  useEffect(()=>{
    const url=window.location.href.split('?')[0];
    if(url.includes('script.google.com')&&!config.scriptUrl)
      setConfig(p=>({...p,scriptUrl:url}));
  },[]);

  // Polling multi-usuario cada 30s
  useEffect(()=>{
    if(!user)return;
    const iv=setInterval(()=>{if(cfgRef.current.scriptUrl&&navigator.onLine)silentPoll(cfgRef.current.scriptUrl);},30000);
    return()=>clearInterval(iv);
  },[user]);

  async function silentPoll(url){
    try{
      const r=await fetch(url+'?t='+Date.now(),{signal:AbortSignal.timeout(8000)});
      const d=await r.json();if(!d.ok)return;
      let changed=false;
      if(d.coches&&d.coches.length>0){const m=mapCoches(d.coches);setCoches(m);changed=true;}
      if(d.tuneles&&d.tuneles.length>0){const m=mapTuneles(d.tuneles);setTunnels(m);}
      if(d.historial&&d.historial.length>0){const m=mapHistorial(d.historial);setHistory(m);}
      if(changed)saveCache({coches:cochesRef.current,tunnels:tunnelsRef.current,history:history});
    }catch{}
  }

  function autoSync(nc,nt){
    const c=nc||cochesRef.current;const t=nt||tunnelsRef.current;
    saveCache({coches:c,tunnels:t,history:history});
    if(!cfgRef.current.scriptUrl||!navigator.onLine)return;
    if(syncTimer.current)clearTimeout(syncTimer.current);
    syncTimer.current=setTimeout(()=>{
      fetch(cfgRef.current.scriptUrl,{method:'POST',
        body:JSON.stringify({action:'syncAll',tunnels:t,coches:c}),
        headers:{'Content-Type':'text/plain'},
        signal:AbortSignal.timeout(8000)}).catch(()=>{});
    },3000);
  }

  async function loadFromSheets(url){
    if(!url)return;
    setSyncing(true);setSyncMsg('⟳ Cargando...');
    try{
      const r=await fetch(url+'?t='+Date.now(),{signal:AbortSignal.timeout(12000)});
      const d=await r.json();if(!d.ok)throw new Error(d.error);
      if(d.coches&&d.coches.length>0)setCoches(mapCoches(d.coches));
      if(d.tuneles&&d.tuneles.length>0)setTunnels(mapTuneles(d.tuneles));
      if(d.historial&&d.historial.length>0)setHistory(mapHistorial(d.historial));
      saveCache({coches:cochesRef.current,tunnels:tunnelsRef.current,history:history});
      setSyncMsg('✅ '+new Date().toLocaleTimeString('es-EC'));
    }catch(e){setSyncMsg('⚠ Sin red — cache local');}
    setSyncing(false);
  }

  function fireNotif(a){
    if(typeof Notification!=='undefined'&&Notification.permission==='granted')
      new Notification('❄ FREEZE CONTROL',{body:a.msg,tag:a.id});
    if(cfgRef.current.ntfyTopic)
      fetch(`https://ntfy.sh/${cfgRef.current.ntfyTopic}`,{method:'POST',
        headers:{'Title':'❄ FREEZE CONTROL','Priority':a.type==='temp-alert'?'urgent':'high','Tags':'rotating_light','Content-Type':'text/plain'},
        body:a.msg+'\n'+new Date().toLocaleTimeString('es-EC')}).catch(()=>{});
  }

  function login(e){
    e?.preventDefault();
    const u=users.find(x=>x.email===lEmail&&x.password===lPass);
    if(!u){setLErr('Credenciales incorrectas');return;}
    setUser(u);setView('dashboard');setLErr('');
    if(typeof Notification!=='undefined'&&Notification.permission==='default')Notification.requestPermission();
    if(config.scriptUrl)loadFromSheets(config.scriptUrl);

  // ── OPERACIONES DE COCHES ──────────────────────────────────────
  function markReady(id){
    const c=coches.find(x=>x.id===id);const t=tunnels.find(x=>x.id===c?.tunnelId);
    if(c&&t){
      const outsideMs=c.productLoadTime&&c.entryTime?c.entryTime-c.productLoadTime:0;
      const entry={id:gid(),number:c.number,productName:c.productName,unitType:c.unitType,
        units:c.units||c.cajetas,weightPerUnit:c.weightPerUnit,weightUnit:c.weightUnit,totalLbs:c.totalLbs||c.lbs,
        tunnelId:t.id,tunnelName:t.name,tunnelType:t.type,
        productLoadTime:c.productLoadTime,entryTime:c.entryTime,exitTime:Date.now(),
        outsideMin:Math.round(outsideMs/60000),horasEnTunel:((Date.now()-c.entryTime)/3600000).toFixed(2),
        shift:shiftOf(Date.now()),userName:user?.name};
      setHistory(p=>[entry,...p]);
      if(config.scriptUrl)fetch(config.scriptUrl,{method:'POST',body:JSON.stringify({action:'logHistorial',...entry}),headers:{'Content-Type':'text/plain'}}).catch(()=>{});
    }
    const nc=coches.map(x=>x.id===id?{...x,status:'masterizando',tunnelId:null,exitTime:Date.now(),masterTime:Date.now()}:x);
    setCoches(nc);autoSync(nc,null);
  }
  function setFree(id){const nc=coches.map(c=>c.id===id?{...c,status:'libre',tunnelId:null,entryTime:null}:c);setCoches(nc);autoSync(nc,null);}
  function sendToMaster(id){const nc=coches.map(c=>c.id===id?{...c,status:'masterizando',masterTime:Date.now()}:c);setCoches(nc);autoSync(nc,null);}
  function vaciarCoche(id){
    const c=coches.find(x=>x.id===id);if(!c)return;
    const ciclo={id:gid(),number:c.number,ciclo:(c.ciclos||0)+1,productName:c.productName,
      unitType:c.unitType,units:c.units||c.cajetas,weightPerUnit:c.weightPerUnit,weightUnit:c.weightUnit,totalLbs:c.totalLbs||c.lbs,
      productLoadTime:c.productLoadTime,entryTime:c.entryTime,exitTime:c.exitTime,masterTime:c.masterTime,
      masterMin:c.masterTime?Math.round((Date.now()-c.masterTime)/60000):0,
      shift:shiftOf(Date.now()),userName:user?.name,completedAt:Date.now()};
    setHistory(p=>[ciclo,...p]);
    if(config.scriptUrl)fetch(config.scriptUrl,{method:'POST',body:JSON.stringify({action:'logCiclo',...ciclo}),headers:{'Content-Type':'text/plain'}}).catch(()=>{});
    const lp={productName:c.productName,unitType:c.unitType,weightPerUnit:c.weightPerUnit,weightUnit:c.weightUnit};
    const nc=coches.map(x=>x.id===id?{...x,status:'libre',units:0,totalLbs:0,lbs:0,cajetas:0,productName:'',
      productLoadTime:null,entryTime:null,exitTime:null,masterTime:null,tunnelId:null,ciclos:(x.ciclos||0)+1,lastProduct:lp}:x);
    setCoches(nc);autoSync(nc,null);
  }
  function releaseTunnel(tid,early=false){
    const t=tunnels.find(x=>x.id===tid);const n=Date.now();
    const inT=coches.filter(c=>c.tunnelId===tid&&c.status==='en-tunel');
    inT.forEach(c=>{
      const entry={id:gid(),number:c.number,productName:c.productName,unitType:c.unitType,units:c.units||c.cajetas,
        weightPerUnit:c.weightPerUnit,weightUnit:c.weightUnit,totalLbs:c.totalLbs||c.lbs,
        tunnelId:t?.id,tunnelName:t?.name,tunnelType:t?.type,
        productLoadTime:c.productLoadTime,entryTime:c.entryTime,exitTime:n,
        outsideMin:c.productLoadTime&&c.entryTime?Math.round((c.entryTime-c.productLoadTime)/60000):0,
        earlyRelease:early,shift:shiftOf(n),userName:user?.name};
      setHistory(p=>[entry,...p]);
      if(config.scriptUrl)fetch(config.scriptUrl,{method:'POST',body:JSON.stringify({action:'logHistorial',...entry}),headers:{'Content-Type':'text/plain'}}).catch(()=>{});
    });
    const nc=coches.map(c=>c.tunnelId===tid&&c.status==='en-tunel'?{...c,status:'masterizando',tunnelId:null,exitTime:n,masterTime:n}:c);
    setCoches(nc);autoSync(nc,null);
  }
  function batchEntry(tid,ids,entryTime){
    const nc=coches.map(c=>ids.includes(c.id)?{...c,status:'en-tunel',tunnelId:tid,entryTime}:c);
    setCoches(nc);autoSync(nc,null);
  }
  function dropToTunnel(e,tid){
    e.preventDefault();if(!dragging)return;
    const t=tunnels.find(x=>x.id===tid);if(!t)return;
    const occ=coches.filter(c=>c.tunnelId===tid&&c.status==='en-tunel').length;
    if(occ>=t.capacityCoches){alert('Túnel lleno');setDragging(null);setDragOver(null);return;}
    const nc=coches.map(c=>c.id===dragging.id?{...c,status:'en-tunel',tunnelId:tid,entryTime:Date.now()}:c);
    setCoches(nc);autoSync(nc,null);setDragging(null);setDragOver(null);
  }
  function dropToFree(e){
    e.preventDefault();if(!dragging)return;
    const nc=coches.map(c=>c.id===dragging.id?{...c,status:'libre',tunnelId:null,entryTime:null}:c);
    setCoches(nc);autoSync(nc,null);setDragging(null);setDragOver(null);
  }

  function exportExcel(){
    const wb=XLSX.utils.book_new();
    // Hoja 1: Estado actual coches
    const cochesData=[['#Coche','Estado','Producto','Tipo','Cantidad','Peso/Und','Unidad','Total Lbs','Túnel','Ciclos']];
    coches.forEach(c=>cochesData.push([c.number,c.status,c.productName,c.unitType,c.units||c.cajetas||0,c.weightPerUnit||0,c.weightUnit||'lbs',c.totalLbs||c.lbs||0,c.tunnelId?tunnels.find(t=>t.id===c.tunnelId)?.name||'':'',c.ciclos||0]));
    XLSX.utils.book_append_sheet(wb,XLSX.utils.aoa_to_sheet(cochesData),'Coches');
    // Hoja 2: Historial
    const histData=[['#Coche','Producto','Tipo Und','Cantidad','Peso/Und','Unidad','Total Lbs','Túnel','Carga','Entrada Túnel','Salida Túnel','Min Afuera','Horas Túnel','Turno','Operador']];
    history.forEach(h=>histData.push([h.number,h.productName||'',h.unitType||'caja',h.units||h.cajetas||0,h.weightPerUnit||0,h.weightUnit||'lbs',h.totalLbs||h.lbs||0,h.tunnelName||'',fmt(h.productLoadTime),fmt(h.entryTime),fmt(h.exitTime),h.outsideMin||0,h.horasEnTunel||0,SHIFTS.find(s=>s.id===h.shift)?.l||h.shift||'',h.userName||'']));
    XLSX.utils.book_append_sheet(wb,XLSX.utils.aoa_to_sheet(histData),'Historial');
    // Hoja 3: Temperaturas
    const tempData=[['Túnel','Temp Aire','Temp Producto','Objetivo','Δ Aire','Estado','Operador','Fecha/Hora']];
    tempLogs.forEach(l=>tempData.push([l.tunnelName||'',l.airTemp??l.temp??'',l.prodTemp??'',l.targetTemp||0,l.airTemp!=null?Math.abs(l.airTemp-(l.targetTemp||0)):'',l.estado||'normal',l.userName||'',fmt(l.timestamp)]));
    XLSX.utils.book_append_sheet(wb,XLSX.utils.aoa_to_sheet(tempData),'Temperaturas');
    XLSX.writeFile(wb,`FreezeControl_${new Date().toISOString().slice(0,10)}.xlsx`);
  }

LIBRES VACÍOS:${coches.filter(c=>c.status==='libre'&&!(c.units||c.cajetas||0)).length}|LIBRES CON PROD:${coches.filter(c=>c.status==='libre'&&(c.units||c.cajetas||0)>0).length}
ALARMAS PENDIENTES:${alarms.filter(a=>!a.ack).length}|TURNO:${SHIFTS.find(s=>s.id===shift())?.l}|HORA:${new Date().toLocaleTimeString('es-EC')}`;

  // ── TEMPERATURAS ─────────────────────────────────────────────
  function TempsView(){
    const actT=tunnels.find(t=>t.id===selTunnel)||tunnels[0];
    const tLogs=tempLogs.filter(l=>l.tunnelId===(actT?.id)).sort((a,b)=>b.timestamp-a.timestamp);
    const inT=coches.filter(c=>c.tunnelId===actT?.id&&c.status==='en-tunel');
    const [tf,setTf]=useState({airTemp:'',prodTemp:'',estado:'normal',notes:''});
    const sf=(k,v)=>setTf(p=>({...p,[k]:v}));
    const ESTADOS=[{v:'normal',l:'✅ Normal',c:C.g},{v:'defrost',l:'🔄 Defrost',c:C.w},{v:'falla',l:'🔴 Falla',c:C.d},{v:'recuperacion',l:'📉 Recuperación',c:'#aa88ff'},{v:'listo',l:'🏁 Listo',c:'#00e888'}];

    const ei={normal:'✅',defrost:'🔄',falla:'🔴',recuperacion:'📉',listo:'🏁'};
    const aD=tf.airTemp?Math.abs(+tf.airTemp-(actT?.targetTemp||0)):null;
    const aC=aD===null?C.t2:aD<=2?C.g:aD<=5?C.w:C.d;
    const pD=tf.prodTemp?Math.abs(+tf.prodTemp-(actT?.targetTemp||0)):null;
    const pC=pD===null?C.t2:+tf.prodTemp<=(actT?.targetTemp||0)+1?C.g:pD<=3?C.w:C.t2;
    const saveTemp=()=>{
      if(!tf.airTemp&&!tf.prodTemp)return;
      const log={id:gid(),tunnelId:actT.id,tunnelName:actT.name,tunnelType:actT.type,
        airTemp:tf.airTemp?+tf.airTemp:null,prodTemp:tf.prodTemp?+tf.prodTemp:null,
        temp:tf.airTemp?+tf.airTemp:(tf.prodTemp?+tf.prodTemp:0),
        targetTemp:actT.targetTemp,estado:tf.estado,notes:tf.notes,userName:user?.name,timestamp:Date.now()};
      setTempLogs(p=>[log,...p]);
      if(config.scriptUrl)fetch(config.scriptUrl,{method:'POST',body:JSON.stringify({action:'logTemp',...log}),headers:{'Content-Type':'text/plain'}}).catch(()=>{});
      setTf({airTemp:'',prodTemp:'',estado:'normal',notes:''});setShowTempForm(false);
    };
    return html`<div style=${{display:'grid',gridTemplateColumns:'200px 1fr',gap:0,height:'calc(100vh - 90px)'}}>

      <div style=${{background:C.s1,borderRight:`1px solid ${C.b}`,padding:12,overflowY:'auto'}}>
        <div style=${{fontFamily:'Orbitron,monospace',fontSize:9,color:C.m,marginBottom:10,letterSpacing:1}}>TÚNELES</div>

          const dA=lA!=null?Math.abs(lA-t.targetTemp):null;
          const dC=dA===null?C.m:dA<=2?C.g:dA<=5?C.w:C.d;
          const inTc=coches.filter(c=>c.tunnelId===t.id&&c.status==='en-tunel').length;
          const active=(selTunnel||tunnels[0]?.id)===t.id;
          return html`<button key=${t.id} onClick=${()=>setSelTunnel(t.id)}
            style=${{width:'100%',background:active?`${t.color}18`:C.s3,border:`2px solid ${active?t.color:C.b}`,borderRadius:10,padding:10,cursor:'pointer',marginBottom:6,textAlign:'left',transition:'all .15s'}}>
            <div style=${{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:4}}>
              <span style=${{fontFamily:'Orbitron,monospace',fontWeight:700,fontSize:10,color:active?t.color:C.t}}>${t.name.split(' ').slice(-2).join(' ')}</span>
              <${Tag} color=${t.color}>${TT[t.type]?.l}</${Tag}>
            </div>
            <div style=${{display:'flex',gap:10}}>
              <div><div style=${{fontSize:8,color:C.m}}>AIRE</div><div style=${{fontFamily:'Orbitron,monospace',fontSize:16,color:dC,fontWeight:700}}>${lA!=null?`${lA}°C`:'—'}</div></div>
              <div><div style=${{fontSize:8,color:C.m}}>PROD</div><div style=${{fontFamily:'Orbitron,monospace',fontSize:16,color:lP!=null?C.g:C.m,fontWeight:700}}>${lP!=null?`${lP}°C`:'—'}</div></div>
              <div style=${{marginLeft:'auto'}}><div style=${{fontSize:8,color:C.m}}>COCHES</div><div style=${{fontFamily:'Orbitron,monospace',fontSize:14,color:inTc>0?C.w:C.m}}>${inTc}</div></div>
            </div>
            <div style=${{fontSize:9,color:C.m,marginTop:3}}>${logs.length} registros</div>
          </button>`;
        })}
      </div>
      <!-- Timeline -->
      <div style=${{padding:14,overflowY:'auto',display:'flex',flexDirection:'column',gap:10}}>
        <div style=${{display:'flex',justifyContent:'space-between',alignItems:'center'}}>
          <div>
            <div style=${{fontFamily:'Orbitron,monospace',fontSize:13,color:actT?.color,fontWeight:700}}>${actT?.name}</div>

          </div>
          <${Btn} onClick=${()=>setShowTempForm(p=>!p)} color=${C.ac}>${showTempForm?'✕ Cancelar':'+ Nuevo Registro'}</${Btn}>
        </div>
        ${inT.length>0&&html`<div style=${{background:C.s1,border:`1px solid ${actT?.color}30`,borderRadius:8,padding:10}}>
          <div style=${{fontSize:9,color:C.m,marginBottom:6,textTransform:'uppercase',letterSpacing:.8}}>Coches activos</div>
          <div style=${{display:'flex',flexWrap:'wrap',gap:6}}>
            ${inT.map(c=>{const el=now-c.entryTime;const tc2=tcol(el,actT?.targetTimeHours);
              return html`<div key=${c.id} style=${{background:C.s3,borderRadius:6,padding:'6px 10px',border:`1px solid ${tc2}40`}}>
                <div style=${{fontFamily:'Orbitron,monospace',fontWeight:700,fontSize:11,color:C.t}}>#${c.number}</div>
                <div style=${{fontSize:9,color:C.t2}}>${c.productName} · ${c.units||c.cajetas||0} ${c.unitType==='funda'?'f':'c'}</div>
                <div style=${{fontSize:10,color:C.g}}>⚖ ${(c.totalLbs||c.lbs||0).toLocaleString()} lbs</div>
                <div style=${{fontFamily:'Orbitron,monospace',fontSize:10,color:tc2}}>${elp(el)}</div>
                <div style=${{background:C.s2,borderRadius:2,height:3,marginTop:2}}>
                  <div style=${{background:tc2,borderRadius:2,height:'100%',width:`${Math.min(100,pct(el,actT?.targetTimeHours*3600e3))}%`}}/>
                </div>
              </div>`;
            })}
          </div>
        </div>`}
        ${showTempForm&&actT&&html`<div style=${{background:C.s1,border:`2px solid ${actT.color}`,borderRadius:10,padding:14}} class="fade">
          <div style=${{fontFamily:'Orbitron,monospace',fontSize:10,color:actT.color,marginBottom:12}}>📝 NUEVO REGISTRO — ${actT.name}</div>
          <div style=${{display:'flex',flexWrap:'wrap',gap:5,marginBottom:12}}>
            ${ESTADOS.map(e=>html`<button key=${e.v} onClick=${()=>sf('estado',e.v)}
              style=${{padding:'5px 10px',borderRadius:6,border:`1px solid ${tf.estado===e.v?e.c:C.b}`,
              background:tf.estado===e.v?`${e.c}18`:C.s3,color:tf.estado===e.v?e.c:C.t2,cursor:'pointer',fontSize:11}}>${e.l}</button>`)}
          </div>
          <div style=${{display:'grid',gridTemplateColumns:'1fr 1fr',gap:10,marginBottom:10}}>
            <div>
              <div style=${{fontSize:9,color:C.m,marginBottom:4,textTransform:'uppercase',letterSpacing:.8}}>🌡 Temp AIRE (°C)</div>
              <input type="number" value=${tf.airTemp} onInput=${e=>sf('airTemp',e.target.value)} placeholder=${String(actT.targetTemp)}
                style=${{width:'100%',background:C.s3,border:`1px solid ${tf.airTemp?aC:C.b}`,borderRadius:6,padding:'8px 10px',color:C.t,fontSize:14,fontFamily:'Orbitron,monospace'}}/>
              ${tf.airTemp&&html`<div style=${{fontSize:10,color:aC,marginTop:2}}>
                ${aD<=2?'✅ Correcto':aD<=5?`⚠ Δ${aD}°C`:tf.estado==='defrost'?`🔄 Defrost Δ${aD}°C`:`🔴 CRÍTICO Δ${aD}°C`}
              </div>`}
            </div>
            <div>
              <div style=${{fontSize:9,color:C.m,marginBottom:4,textTransform:'uppercase',letterSpacing:.8}}>🧊 Temp PRODUCTO (°C)</div>
              <input type="number" value=${tf.prodTemp} onInput=${e=>sf('prodTemp',e.target.value)} placeholder=${String(actT.targetTemp)}
                style=${{width:'100%',background:C.s3,border:`1px solid ${tf.prodTemp?pC:C.b}`,borderRadius:6,padding:'8px 10px',color:C.t,fontSize:14,fontFamily:'Orbitron,monospace'}}/>
              ${tf.prodTemp&&html`<div style=${{fontSize:10,color:pC,marginTop:2}}>
                ${+tf.prodTemp<=actT.targetTemp+1?'✅ ¡Producto listo!':pD<=3?`⚠ Casi listo`:pD<=8?`❄ En proceso`:`❌ Aún caliente`} (Δ${pD}°C)

          <div style=${{display:'flex',justifyContent:'space-between',alignItems:'center'}}>

            <div style=${{display:'flex',gap:6}}>
              <${Btn} onClick=${()=>setShowTempForm(false)} color=${C.m}>Cancelar</${Btn}>

        <div style=${{fontFamily:'Orbitron,monospace',fontSize:9,color:C.m,letterSpacing:1}}>${tLogs.length} REGISTROS</div>
        ${tLogs.map((l,i)=>{
          const ec2=ec[l.estado]||C.g;const ei2=ei[l.estado]||'✅';
          const aD2=l.airTemp!=null?Math.abs(l.airTemp-(l.targetTemp||0)):null;
          const pD2=l.prodTemp!=null?Math.abs(l.prodTemp-(l.targetTemp||0)):null;
          return html`<div key=${l.id} style=${{display:'flex',gap:10,marginBottom:0}}>
            <div style=${{display:'flex',flexDirection:'column',alignItems:'center',flexShrink:0}}>
              <div style=${{width:28,height:28,borderRadius:'50%',background:`${ec2}20`,border:`2px solid ${ec2}`,
                display:'flex',alignItems:'center',justifyContent:'center',fontSize:12,

              ${i<tLogs.length-1&&html`<div style=${{width:2,flex:1,minHeight:20,background:C.b,margin:'3px 0'}}/>`}

            <div style=${{background:C.s1,border:`1px solid ${i===0?ec2+'50':C.b}`,borderRadius:8,padding:'10px 12px',marginBottom:8,flex:1}}>

                  <div style=${{fontSize:10,color:C.t2}}>${fmtT(l.timestamp)}</div>

  // ── HISTORIAL ─────────────────────────────────────────────────
  function HistorialView(){
    const [filtro,setFiltro]=useState('');
    const hist=history.filter(h=>!filtro||h.productName?.toLowerCase().includes(filtro.toLowerCase())||h.number?.includes(filtro)||h.tunnelName?.toLowerCase().includes(filtro.toLowerCase()));
    return html`<div style=${{padding:14}}>
      <div style=${{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:14,flexWrap:'wrap',gap:8}}>
        <div style=${{fontFamily:'Orbitron,monospace',fontSize:12,color:C.ac}}>📋 HISTORIAL — ${hist.length} registros</div>
        <div style=${{display:'flex',gap:8}}>
          <input value=${filtro} onInput=${e=>setFiltro(e.target.value)} placeholder="Buscar por coche, producto o túnel..."
            style=${{background:C.s3,border:`1px solid ${C.b}`,borderRadius:6,padding:'6px 12px',color:C.t,fontSize:11,width:220}}/>
          <${Btn} onClick=${exportExcel} color=${C.g}>📥 Descargar Excel</${Btn}>
        </div>
      </div>
      ${hist.length===0&&html`<div style=${{textAlign:'center',padding:40,color:C.m}}>Sin registros en el historial.</div>`}
      ${hist.map(h=>{
        const sh=SHIFTS.find(s=>s.id===h.shift);
        const hrs=h.horasEnTunel||((h.exitTime&&h.entryTime)?((h.exitTime-h.entryTime)/3600000).toFixed(1):0);
        const oC=h.outsideMin>=MAX_OUT?C.d:h.outsideMin>=MAX_OUT*.7?C.w:C.g;
        return html`<div key=${h.id} style=${{background:C.s1,border:`1px solid ${C.b}`,borderRadius:8,padding:'10px 14px',marginBottom:6,display:'grid',gridTemplateColumns:'auto 1fr auto',gap:12,alignItems:'center'}} class="fade">
          <div style=${{fontFamily:'Orbitron,monospace',fontSize:15,fontWeight:700,color:C.t}}>#${h.number}</div>
          <div>
            <div style=${{fontSize:12,color:C.t,marginBottom:2}}>${h.productName} · ${h.tunnelName}</div>
            <div style=${{display:'flex',gap:8,flexWrap:'wrap'}}>
              <span style=${{fontSize:10,color:C.ac}}>📦 ${h.units||h.cajetas||0} ${h.unitType==='funda'?'fundas':'cajas'}</span>
              <span style=${{fontSize:10,color:C.g,fontWeight:700}}>⚖ ${(h.totalLbs||h.lbs||0).toLocaleString()} lbs</span>
              <span style=${{fontSize:10,color:C.m}}>${h.weightPerUnit||0}${h.weightUnit||'lbs'}/und</span>
            </div>
            <div style=${{fontSize:9,color:C.m,marginTop:2}}>
              ${h.productLoadTime?`Carga: ${fmtT(h.productLoadTime)} → `:''}Entrada: ${fmtT(h.entryTime)} → Salida: ${fmtT(h.exitTime)}
            </div>
          </div>
          <div style=${{textAlign:'right'}}>
            <div style=${{fontFamily:'Orbitron,monospace',fontSize:12,color:C.g,marginBottom:2}}>${hrs}h túnel</div>
            ${h.outsideMin>0&&html`<div style=${{fontSize:10,color:oC,fontWeight:600}}>⏱ ${h.outsideMin}min afuera</div>`}
            ${sh&&html`<${Tag} color=${sh.c}>${sh.l}</${Tag}>`}
          </div>
        </div>`;
      })}
    </div>`;
  }

  // ── IA ───────────────────────────────────────────────────────
  function IAView(){
    const quick=['¿Qué coches están listos?','¿Hay temperatura anormal o defrost?','¿Qué coche lleva más tiempo afuera?','Resumen del turno actual','¿Qué túnel tiene más lbs?'];
    return html`<div style=${{display:'flex',flexDirection:'column',height:'calc(100vh - 90px)'}}>
      <div style=${{flex:1,overflowY:'auto',padding:14,display:'flex',flexDirection:'column',gap:8}}>
        ${aiMsgs.map((m,i)=>html`<div key=${i} style=${{display:'flex',justifyContent:m.role==='user'?'flex-end':'flex-start'}}>
          <div style=${{background:m.role==='user'?`${C.ac}18`:C.s1,border:`1px solid ${m.role==='user'?C.ac:C.b}`,borderRadius:10,padding:'8px 12px',maxWidth:'80%',fontSize:12,color:C.t,lineHeight:1.5}}>${m.content}</div>
        </div>`)}
        ${aiLoading&&html`<div style=${{display:'flex',justifyContent:'flex-start'}}>
          <div style=${{background:C.s1,border:`1px solid ${C.b}`,borderRadius:10,padding:'10px 14px',color:C.ac}}>
            <${Spin}/> Consultando...
          </div>
        </div>`}
        <div ref=${aiEnd}/>
      </div>
      <div style=${{padding:'8px 14px',borderTop:`1px solid ${C.b}`,background:C.s1}}>
        <div style=${{display:'flex',flexWrap:'wrap',gap:4,marginBottom:8}}>
          ${quick.map(q=>html`<button key=${q} onClick=${()=>setAiInput(q)}
            style=${{background:C.s3,border:`1px solid ${C.b}`,color:C.t2,padding:'3px 8px',borderRadius:12,cursor:'pointer',fontSize:10}}>${q}</button>`)}
        </div>
        <div style=${{display:'flex',gap:8}}>
          <input value=${aiInput} onInput=${e=>setAiInput(e.target.value)} onKeyDown=${e=>e.key==='Enter'&&sendAI()} placeholder="Pregunta sobre el estado de los túneles..."
            style=${{flex:1,background:C.s3,border:`1px solid ${C.b}`,borderRadius:8,padding:'9px 12px',color:C.t,fontSize:12}}/>
          <${Btn} onClick=${sendAI} disabled=${!aiInput.trim()||aiLoading} color=${C.ac}>Enviar →</${Btn}>
        </div>
      </div>
    </div>`;
  }

  // ── GESTIÓN ──────────────────────────────────────────────────
  function GestionView(){
    const [tab,setTab]=useState('coches');
    return html`<div style=${{padding:14}}>
      <div style=${{display:'flex',gap:4,marginBottom:14,borderBottom:`1px solid ${C.b}`,paddingBottom:10}}>
        ${[['coches','🚛 Coches'],['tuneles','🧊 Túneles'],['config','⚙ Config']].map(([id,l])=>html`<button key=${id} onClick=${()=>setTab(id)}
          style=${{padding:'5px 14px',borderRadius:6,border:`1px solid ${tab===id?C.ac:C.b}`,background:tab===id?`${C.ac}18`:C.s3,color:tab===id?C.ac:C.t2,cursor:'pointer',fontSize:11,fontWeight:600}}>${l}</button>`)}
      </div>
      ${tab==='coches'&&html`<div>
        <div style=${{display:'flex',justifyContent:'space-between',marginBottom:10}}>
          <span style=${{fontFamily:'Orbitron,monospace',fontSize:11,color:C.t2}}>${coches.length} coches registrados</span>
          <${Btn} onClick=${()=>{setEditCoche(null);setShowCocheForm(true);}} color=${C.g}>+ Nuevo Coche</${Btn}>
        </div>
        <div style=${{display:'grid',gridTemplateColumns:'repeat(auto-fill,minmax(240px,1fr))',gap:8}}>
          ${coches.map(c=>{const t=tunnels.find(x=>x.id===c.tunnelId);const el=c.entryTime?Date.now()-c.entryTime:0;
            return html`<div key=${c.id} style=${{background:C.s1,border:`1px solid ${C.b}`,borderRadius:8,padding:12}} class="fade">
              <div style=${{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:8}}>
                <span style=${{fontFamily:'Orbitron,monospace',fontWeight:700,fontSize:14,color:C.t}}>#${c.number}</span>
                <${Tag} color=${c.status==='en-tunel'?C.w:c.status==='masterizando'?'#aa88ff':C.t2}>${c.status}</${Tag}>
              </div>
              ${[['Producto',c.productName||'—'],['Tipo',c.unitType==='funda'?'Fundas':'Cajas'],[`${c.unitType==='funda'?'Fundas':'Cajas'}`,`${c.units||c.cajetas||0}`],['Peso/und',`${c.weightPerUnit||0} ${c.weightUnit||'lbs'}`],['Total Lbs',`${(c.totalLbs||c.lbs||0).toLocaleString()} lbs`],['Túnel',t?.name||'—'],['Ciclos',c.ciclos||0]].map(([k,v])=>html`<div key=${k} style=${{display:'flex',justifyContent:'space-between',fontSize:11,padding:'2px 0',borderBottom:`1px solid ${C.b}25`}}>
                <span style=${{color:C.m}}>${k}</span><span style=${{color:k==='Total Lbs'?C.g:C.t,fontWeight:k==='Total Lbs'?700:400}}>${v}</span>
              </div>`)}
              ${c.status==='en-tunel'&&html`<div style=${{marginTop:6}}>
                <div style=${{display:'flex',justifyContent:'space-between',fontSize:9,marginBottom:2}}><span style=${{color:C.m}}>EN TÚNEL</span><span style=${{color:tcol(el,t?.targetTimeHours),fontFamily:'Orbitron,monospace'}}>${elp(el)}</span></div>
                <div style=${{background:C.s3,borderRadius:2,height:3}}><div style=${{background:tcol(el,t?.targetTimeHours),borderRadius:2,height:'100%',width:`${pct(el,(t?.targetTimeHours||1)*3600e3)}%`}}/></div>
              </div>`}
              <div style=${{display:'flex',gap:5,marginTop:8}}>
                <${Btn} sm=${true} color=${C.ac} onClick=${()=>{setEditCoche(c);setShowCocheForm(true);}}>✏ Editar</${Btn}>
                <${Btn} sm=${true} color=${C.d} onClick=${()=>{if(!confirm(`¿Eliminar coche #${c.number}?`))return;const nc=coches.filter(x=>x.id!==c.id);setCoches(nc);autoSync(nc,null);if(config.scriptUrl)fetch(config.scriptUrl,{method:'POST',body:JSON.stringify({action:'deleteCoche',cocheId:c.id}),headers:{'Content-Type':'text/plain'}}).catch(()=>{});}}>✕ Eliminar</${Btn}>
              </div>
            </div>`;
          })}
        </div>
      </div>`}
      ${tab==='tuneles'&&html`<div>
        <div style=${{display:'flex',justifyContent:'space-between',marginBottom:10}}>
          <span style=${{fontFamily:'Orbitron,monospace',fontSize:11,color:C.t2}}>${tunnels.length} túneles</span>
        </div>
        <div style=${{display:'grid',gridTemplateColumns:'repeat(auto-fill,minmax(260px,1fr))',gap:8}}>
          ${tunnels.map(t=>{const inT=coches.filter(c=>c.tunnelId===t.id&&c.status==='en-tunel');const lbs=inT.reduce((a,c)=>a+(c.totalLbs||c.lbs||0),0);
            return html`<div key=${t.id} style=${{background:C.s1,border:`2px solid ${t.color}40`,borderRadius:10,padding:14}} class="fade">
              <div style=${{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:10}}>
                <div style=${{fontFamily:'Orbitron,monospace',fontWeight:700,fontSize:12,color:t.color}}>${t.name}</div>
                <${Tag} color=${t.color}>${TT[t.type]?.l}</${Tag}>
              </div>
              ${[['Temp objetivo',`${t.targetTemp}°C`],['Tiempo',`${t.targetTimeHours}h`],['Capacidad',`${inT.length}/${t.capacityCoches} coches`],['Lbs en túnel',`${lbs.toLocaleString()} lbs`],['Revisión temp',`Cada ${t.checkIntervalMin}min`]].map(([k,v])=>html`<div key=${k} style=${{display:'flex',justifyContent:'space-between',fontSize:11,padding:'3px 0',borderBottom:`1px solid ${C.b}25`}}>
                <span style=${{color:C.m}}>${k}</span><span style=${{color:C.t}}>${v}</span>
              </div>`)}
              <div style=${{background:C.s3,borderRadius:2,height:4,marginTop:8}}>
                <div style=${{background:t.color,borderRadius:2,height:'100%',width:`${pct(inT.length,t.capacityCoches)}%`,opacity:.8}}/>
              </div>
            </div>`;
          })}
        </div>
      </div>`}
      ${tab==='config'&&html`<div style=${{maxWidth:600}}>
        <div style=${{background:C.s1,border:`1px solid ${C.b}`,borderRadius:10,padding:16,marginBottom:12}}>
          <div style=${{fontFamily:'Orbitron,monospace',fontSize:10,color:C.ac,marginBottom:12}}>☁ GOOGLE SHEETS</div>
          <${Fld} label="URL del script /exec" value=${config.scriptUrl} onChange=${v=>setConfig(p=>({...p,scriptUrl:v.trim()}))} placeholder="https://script.google.com/macros/s/.../exec"/>
          <div style=${{display:'flex',gap:8,marginBottom:8}}>
            <${Btn} onClick=${()=>loadFromSheets(config.scriptUrl)} disabled=${syncing||!config.scriptUrl||!online} color=${C.g}>${syncing?html`<${Spin}/> Cargando...`:'↓ Cargar desde Sheets'}</${Btn}>
            <${Btn} onClick=${()=>{if(!config.scriptUrl)return;setSyncing(true);fetch(config.scriptUrl,{method:'POST',body:JSON.stringify({action:'syncAll',tunnels,coches}),headers:{'Content-Type':'text/plain'}}).then(()=>setSyncMsg('✅ Sincronizado')).catch(()=>setSyncMsg('❌ Error')).finally(()=>setSyncing(false));}} disabled=${syncing||!config.scriptUrl||!online} color=${C.ac}>${syncing?html`<${Spin}/>`:'☁ Subir a Sheets'}</${Btn}>
          </div>
          ${syncMsg&&html`<div style=${{fontSize:10,color:syncMsg.includes('✅')?C.g:C.d,padding:'5px 8px',background:syncMsg.includes('✅')?`${C.g}10`:`${C.d}10`,borderRadius:5}}>${syncMsg}</div>`}
        </div>
        <div style=${{background:C.s1,border:`1px solid ${C.b}`,borderRadius:10,padding:16,marginBottom:12}}>
          <div style=${{fontFamily:'Orbitron,monospace',fontSize:10,color:C.w,marginBottom:12}}>🔔 NOTIFICACIONES (ntfy.sh)</div>
          <${Fld} label="Canal ntfy (nombre único de tu planta)" value=${config.ntfyTopic} onChange=${v=>setConfig(p=>({...p,ntfyTopic:v.toLowerCase().replace(/[^a-z0-9-]/g,'')}))} placeholder="freeze-planta-2024"/>
          ${config.ntfyTopic&&html`<div style=${{background:`${C.g}10`,border:`1px solid ${C.g}30`,borderRadius:6,padding:10,marginBottom:8}}>
            <div style=${{fontSize:10,color:C.g,marginBottom:4}}>Canal: ntfy.sh/${config.ntfyTopic}</div>
            <div style=${{fontSize:10,color:C.t2,marginBottom:6}}>Comparte este link con tu equipo para que se suscriban:</div>
            <div style=${{fontFamily:'monospace',fontSize:11,color:C.ac,wordBreak:'break-all'}}>https://ntfy.sh/${config.ntfyTopic}</div>
            <div style=${{display:'flex',gap:6,marginTop:8}}>
              <${Btn} sm=${true} color=${C.ac} onClick=${()=>window.open(`https://ntfy.sh/${config.ntfyTopic}`)}>🔗 Abrir</${Btn}>
              <${Btn} sm=${true} color=${C.m} onClick=${()=>navigator.clipboard?.writeText(`https://ntfy.sh/${config.ntfyTopic}`)}>📋 Copiar</${Btn}>
              <${Btn} sm=${true} color=${C.w} onClick=${()=>fetch(`https://ntfy.sh/${config.ntfyTopic}`,{method:'POST',headers:{'Title':'❄ FREEZE CONTROL','Tags':'white_check_mark','Content-Type':'text/plain'},body:'🧊 Prueba — Notificaciones funcionando ✅'})}>🔔 Probar</${Btn}>
            </div>
          </div>`}
          <div style=${{display:'flex',gap:8,alignItems:'center',marginTop:8}}>
            <div style=${{width:8,height:8,borderRadius:'50%',background:typeof Notification!=='undefined'&&Notification.permission==='granted'?C.g:C.d}}/>
            <span style=${{fontSize:10,color:C.t2}}>Notificaciones del navegador: ${typeof Notification!=='undefined'?Notification.permission:'no soportado'}</span>
            ${typeof Notification!=='undefined'&&Notification.permission!=='granted'&&html`<${Btn} sm=${true} color=${C.ac} onClick=${()=>Notification.requestPermission()}>Activar</${Btn}>`}
          </div>
        </div>
        <div style=${{background:C.s1,border:`1px solid ${C.b}`,borderRadius:10,padding:16}}>
          <div style=${{fontFamily:'Orbitron,monospace',fontSize:10,color:C.g,marginBottom:12}}>📥 EXPORTAR DATOS</div>
          <${Btn} onClick=${exportExcel} color=${C.g}>📥 Descargar Reporte Excel (.xlsx)</${Btn}>
          <div style=${{fontSize:10,color:C.m,marginTop:6}}>Incluye: Coches actuales · Historial completo · Temperaturas</div>
        </div>
      </div>`}
    </div>`;
  }
}

// Renderizar — el splash se oculta desde App vía useEffect
setTimeout(()=>{
  try{
    ReactDOM.createRoot(document.getElementById('root')).render(html`<${App}/>`);
  }catch(e){
    document.getElementById('splash').innerHTML=`<div style="color:#ff3366;font-family:monospace;padding:20px;max-width:600px">❌ Error: ${e.message}<br/><br/><small>${e.stack}</small></div>`;
  }
},0);
</script>
</body>
</html>
