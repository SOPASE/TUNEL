// ── SONIDOS DE ALARMA (Web Audio API) ───────────────────
function playAlarmSound(type){
  var cfg=getAlmCfg();
  if(!cfg.soundOn)return;
  if(type==='product-ready'&&!cfg.productReady)return;
  if(type==='outside-alert'&&!cfg.outsideAlert)return;
  if(type==='temp-check'&&!cfg.tempCheck)return;
  var vol=parseFloat(cfg.vol)||0.4;
  try{
    var ctx=new (window.AudioContext||window.webkitAudioContext)();
    function beep(freq,start,dur,vMult,wave){
      var osc=ctx.createOscillator();var gain=ctx.createGain();
      osc.connect(gain);gain.connect(ctx.destination);
      osc.frequency.value=freq;osc.type=wave||'sine';
      gain.gain.setValueAtTime(0.001,ctx.currentTime+start);
      gain.gain.linearRampToValueAtTime(vol*(vMult||1),ctx.currentTime+start+0.02);
      gain.gain.exponentialRampToValueAtTime(0.001,ctx.currentTime+start+dur);
      osc.start(ctx.currentTime+start);osc.stop(ctx.currentTime+start+dur+0.05);
    }
    if(type==='product-ready'){
      beep(700,0,0.12,0.9,'sine');
      beep(880,0.18,0.12,1,'sine');
      beep(1100,0.36,0.22,1.2,'sine');
    }else if(type==='outside-alert'){
      beep(900,0,0.18,1.1,'square');
      beep(600,0.28,0.28,1.1,'square');
    }else if(type==='temp-check'){
      beep(520,0,0.35,0.6,'sine');
    }
  }catch(e){}
}

// ── SONIDO URGENTE (fase final alarma escalante) ────────
function playUrgentSound(){
  var cfg=getAlmCfg();if(!cfg.soundOn||!cfg.productReady)return;
  var vol=parseFloat(cfg.vol)||0.4;
  try{
    var ctx=new (window.AudioContext||window.webkitAudioContext)();
    function beep(freq,start,dur,wave){
      var o=ctx.createOscillator(),g=ctx.createGain();
      o.connect(g);g.connect(ctx.destination);
      o.frequency.value=freq;o.type=wave||'square';
      g.gain.setValueAtTime(0.001,ctx.currentTime+start);
      g.gain.linearRampToValueAtTime(vol*1.3,ctx.currentTime+start+0.015);
      g.gain.exponentialRampToValueAtTime(0.001,ctx.currentTime+start+dur);
      o.start(ctx.currentTime+start);o.stop(ctx.currentTime+start+dur+0.05);
    }
    // 4 pitidos cortos muy urgentes tipo código de emergencia
    [0,0.15,0.30,0.45].forEach(function(t){beep(1200,t,0.1,'square')});
    beep(600,0.7,0.3,'sine');
  }catch(e){}
}

  var data=p.data||[],w=p.w||120,h2=p.h||32,color=p.color||C.ac;

  var d2=pts.map(function(p2,i){return(i===0?'M':'L')+p2[0].toFixed(1)+','+p2[1].toFixed(1)}).join(' ');

function VHistorial(p){

  function togArr(setFn,val){setFn(function(prev){return prev.indexOf(val)>-1?prev.filter(function(x){return x!==val}):prev.concat([val])})};
  function clearFilters(){setQ('');setFDates([]);setFShifts([]);setFTunels([]);setFProds([]);setFLotes([]);setFUser('');}
  var activeFilters=[q,fUser].filter(Boolean).length+fDates.length+fShifts.length+fTunels.length+fProds.length+fLotes.length;
  // Opciones únicas para selects
  var allProducts=[...new Set(p.history.map(function(h){return h.productName}).filter(Boolean))].sort();
  var allTunels2=[...new Set(p.history.map(function(h){return h.tunnelName}).filter(Boolean))].sort();
  var allUsers=[...new Set(p.history.map(function(h){return h.userName}).filter(Boolean))].sort();

  // Últimas 14 fechas únicas del historial
  var allDates=[...new Set(p.history.map(function(hh){var ts=hh.exitTime||hh.entryTime;return ts?new Date(ts).toISOString().slice(0,10):null}).filter(Boolean))].sort().reverse().slice(0,14);
  
  var hist=p.history.filter(function(hh){
    if(q&&(hh.productName||'').toLowerCase().indexOf(q.toLowerCase())===-1&&(hh.number||'').indexOf(q)===-1&&(hh.tunnelName||'').toLowerCase().indexOf(q.toLowerCase())===-1&&(hh.lote||'').toLowerCase().indexOf(q.toLowerCase())===-1)return false;
    if(fDates.length){var d=hh.exitTime?new Date(hh.exitTime).toISOString().slice(0,10):(hh.entryTime?new Date(hh.entryTime).toISOString().slice(0,10):'');if(fDates.indexOf(d)===-1)return false;}

    if(!navigator.onLine){retryQueue.current.push({payload:payload,attempts:attempts||0});return;}
    var att=attempts||0;
    setSyncSt('syncing');
    fetch(url,{method:'POST',body:JSON.stringify(payload),headers:{'Content-Type':'text/plain'}})
      .then(function(r){return r.text()})
      .then(function(txt){
        try{var j=JSON.parse(txt);if(!j.ok)throw new Error(j.error||'GS error');}catch(e){if(txt.indexOf('{')===0)throw e;}
        setSyncSt('ok');
        setSMsg('Sheets OK '+new Date().toLocaleTimeString('es-EC',{hour:'2-digit',minute:'2-digit'}));
        setTimeout(function(){setSyncSt('idle');setSMsg('');},5000);
        lastChangeRef.current=Date.now(); // refrescar para que poll no pise datos recién enviados
      })
      .catch(function(err){
        if(att<3){
          var delay=[3000,8000,20000][att]||20000;
          setSyncSt('error');setSMsg('Reintentando ('+(att+1)+'/3)...');
          setTimeout(function(){pushToSheets(payload,att+1);},delay);
        }else{
          setSyncSt('error');setSMsg('⚠ Error Sheets: '+(err.message||'revisa URL'));
        }
      });
  }

  // Flush cola de reintentos cuando vuelve la conexion
  useEffect(function(){
    function onOnline(){
      if(retryQueue.current.length){
        var q=retryQueue.current.splice(0);
        q.forEach(function(item){pushToSheets(item.payload,item.attempts)});
      }
    }
    window.addEventListener('online',onOnline);
    return function(){window.removeEventListener('online',onOnline)};
  },[]);

  function load(url){
    if(!url)return;
    setSyncing(true);setSMsg('Cargando desde Sheets...');
    fetch(url+'?t='+Date.now())
      .then(function(r){return r.json()})
      .then(function(d){
        if(!d.ok)throw new Error(d.error||'Error desconocido');
        // Sheets es la fuente de verdad — siempre aplicar lo que llegue
        var nc=d.coches?mapC(d.coches):null;
        var nt=d.tuneles&&d.tuneles.length?mapT(d.tuneles):null;
        var nh=d.historial?mapH(d.historial):null;
        var ntl=d.tempRegistros?mapTL(d.tempRegistros):null;
        if(nc!==null){coR.current=nc;setCoches(nc);}
        if(nt!==null){tuR.current=nt;setTunnels(nt);}
        if(nh!==null){hiR.current=nh;setHistory(nh);}
        if(ntl!==null){tlR.current=ntl;setTLogs(ntl);}
        if(d.usuarios&&d.usuarios.length){var m=mapU(d.usuarios);if(m.length)usersRef.current=m;}
        // Guardar en cache local lo que vino de Sheets
        sc({
          coches:nc||coR.current,
          tunnels:nt||tuR.current,
          history:nh||hiR.current,
          tLogs:ntl||tlR.current
        });
        setSMsg('Sheets OK '+new Date().toLocaleTimeString('es-EC',{hour:'2-digit',minute:'2-digit'}));
        setSyncSt('ok');setTimeout(function(){setSyncSt('idle')},4000);
        setSyncing(false);
      })
      .catch(function(err){
        setSMsg('Error: '+(err.message||'Sin conexion'));
        setSyncSt('error');setSyncing(false);
      });
  }

  function localAIAnalysis(msg){
    var n=Date.now();
    var msgL=msg.toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g,'');
    // Snapshots de datos
    var enT=coches.filter(function(c){return c.status==='en-tunel'});
    var libres=coches.filter(function(c){return c.status==='libre'});
    var master=coches.filter(function(c){return c.status==='masterizando'});
    var libresConProd=libres.filter(function(c){return(c.units||0)>0});
    var unack=alarms.filter(function(a){return !a.ack});
    var lbsActual=enT.reduce(function(a,c){return a+(c.totalLbs||0)},0);
    var cs=curShift();
    var shiftLabel=SHIFTS.find(function(s){return s.id===cs}).l;
    // Detección de intención
    var isResumen=/resumen|completo|turno|todo|general|como (va|esta|van)|situacion|overview|dame un/.test(msgL);
    var isTemp=/temp|termico|grado|calor|frio|aire|producto.*temp|registro.*temp/.test(msgL);
    var isTime=/tiempo|a tiempo|saliendo|retras|hora|demor|cuanto.*falt|falt.*cuanto/.test(msgL);
    var isLbs=/libra|lbs|peso|kilogram|tonela|cantidad|proceso|cuanto.*product|product.*cuanto/.test(msgL);
    var isAlarma=/alarm|critica|pendiente|urgente|alert|hay.*alarma|alarma.*hay/.test(msgL);
    var isHist=/histori|rendimiento|ciclo|estadist|semana|promedi|record|cuantos.*ciclo|ciclo.*total/.test(msgL);
    var isAfuera=/afuera|fuera|limite|tiempo.*fuera|coche.*afuera|mas.*tiempo|quien.*mas/.test(msgL);
    var isRecomend=/recomend|consejo|que (hago|hacer)|sugier|mejor|idea|accion/.test(msgL);
    var isCapac=/capaci|lleno|espacio|cuantos.*entran|lugar|ocup/.test(msgL);
    var lines=[];
    var header='🤖 FREEZE CONTROL IA  —  '+new Date().toLocaleTimeString('es-EC',{hour:'2-digit',minute:'2-digit'})+' · Turno '+shiftLabel;
    lines.push(header);
    lines.push('─────────────────────────────────────');

    // ── RESUMEN COMPLETO ──
    if(isResumen||(!isTemp&&!isTime&&!isLbs&&!isAlarma&&!isHist&&!isAfuera&&!isRecomend&&!isCapac)){
      lines.push('📊 ESTADO GENERAL DEL TURNO\n');
      // Túneles
      tunnels.forEach(function(t){
        var inT2=coches.filter(function(c){return c.tunnelId===t.id&&c.status==='en-tunel'});
        var lbs2=inT2.reduce(function(a,c){return a+(c.totalLbs||0)},0);
        var ocup=Math.round(inT2.length/t.capacityCoches*100);
        var icon=ocup>=90?'🔴':ocup>=60?'🟡':'🟢';
        lines.push(icon+' '+t.name);
        lines.push('   '+inT2.length+'/'+t.capacityCoches+' coches · '+lbs2.toLocaleString()+' lbs · Obj: '+t.targetTemp+'°C / '+t.targetTimeHours+'h');
        var lastLog=tLogs.filter(function(l){return l.tunnelId===t.id}).sort(function(a,b){return b.timestamp-a.timestamp})[0];
        if(lastLog){var sinceMin=Math.round((n-lastLog.timestamp)/60000);lines.push('   🌡 Último registro: hace '+sinceMin+'min (aire:'+(lastLog.airTemp!=null?lastLog.airTemp+'°C':'—')+' / prod:'+(lastLog.prodTemp!=null?lastLog.prodTemp+'°C':'—')+')');}
        else{lines.push('   🌡 Sin registros de temperatura');}
        // Coches con su progreso
        inT2.forEach(function(c){
          var el=n-c.entryTime;var pr=pct(el,t.targetTimeHours*3600000);
          var tIcon=pr>=100?'🔴':pr>=80?'🟡':'✅';
          lines.push('   '+tIcon+' #'+c.number+' '+c.productName+' ('+elp(el)+' · '+pr+'%) — '+(c.totalLbs||0).toLocaleString()+' lbs');
        });
        lines.push('');
      });
      // Coches masterizando
      if(master.length){
        lines.push('🔵 MASTERIZANDO ('+master.length+'):');
        master.forEach(function(c){var mt=c.masterTime?Math.round((n-c.masterTime)/60000):0;lines.push('   #'+c.number+' '+c.productName+' · '+mt+'min en master')});
        lines.push('');
      }
      // Libres con producto
      if(libresConProd.length){
        lines.push('⚪ LIBRES CON PRODUCTO ('+libresConProd.length+'):');
        libresConProd.forEach(function(c){var ms=c.productLoadTime?n-c.productLoadTime:0;var oColor=ms>=MAX_OUT*60000?'⚠️':'✅';lines.push('   '+oColor+' #'+c.number+' '+c.productName+' — '+(c.totalLbs||0).toLocaleString()+' lbs · '+(ms>0?elpS(ms)+' desde carga':'sin tiempo'))});
        lines.push('');
      }
      // Resumen numérico
      lines.push('📦 TOTALES: '+enT.length+' en túnel · '+master.length+' master · '+libres.length+' libres');
      lines.push('⚖ Lbs en proceso: '+lbsActual.toLocaleString()+' lbs');
      lines.push('🔔 Alarmas pendientes: '+(unack.length?'⚠️ '+unack.length:'✅ Ninguna'));
    }

    // ── TEMPERATURAS ──
    if(isTemp){
      lines.push('🌡 ANÁLISIS DE TEMPERATURAS\n');
      tunnels.forEach(function(t){
        var logs=tLogs.filter(function(l){return l.tunnelId===t.id}).sort(function(a,b){return b.timestamp-a.timestamp});
        var last=logs[0];
        lines.push('━ '+t.name+' (obj: '+t.targetTemp+'°C)');
        if(!logs.length){lines.push('  ❌ Sin registros de temperatura');lines.push('');return;}
        var sinceMin=Math.round((n-last.timestamp)/60000);
        var stIcon=sinceMin>t.checkIntervalMin?'⚠️':'✅';
        lines.push('  '+stIcon+' Último registro: hace '+sinceMin+'min');
        if(last.airTemp!=null){var aD=Math.abs(last.airTemp-t.targetTemp);var aIcon=aD<=2?'✅':aD<=5?'⚠️':'🔴';lines.push('  '+aIcon+' Aire: '+last.airTemp+'°C  (Δ'+aD.toFixed(1)+'°C '+(last.airTemp<=t.targetTemp?'OK':'sobre objetivo')+')');}
        if(last.prodTemp!=null){var pOK=last.prodTemp<=t.targetTemp+1;lines.push('  '+(pOK?'✅':'⏳')+' Producto: '+last.prodTemp+'°C '+(pOK?'— ¡LISTO!':'— en proceso'));}
        // Historial de estados
        var fallas=logs.slice(0,10).filter(function(l){return l.estado==='falla'}).length;
        var defrost=logs.slice(0,10).filter(function(l){return l.estado==='defrost'}).length;
        if(fallas)lines.push('  🔴 '+fallas+' fallas en últimos 10 registros');
        if(defrost)lines.push('  🟡 '+defrost+' defrost en últimos 10 registros');
        lines.push('');
      });
    }

    // ── TIEMPOS / A TIEMPO ──
    if(isTime){
      lines.push('⏱ ANÁLISIS DE TIEMPOS\n');
      if(!enT.length){lines.push('No hay coches en túnel actualmente.');}
      else{
        var listos=0,demorados=0,encamino=0;
        enT.forEach(function(c){
          var t=tunnels.find(function(x){return x.id===c.tunnelId});if(!t)return;
          var el=n-c.entryTime;var pr=pct(el,t.targetTimeHours*3600000);
          var restMs=t.targetTimeHours*3600000-el;
          if(pr>=100){listos++;lines.push('🔴 #'+c.number+' ('+t.name+'): EXCEDIDO por '+elpS(Math.abs(restMs))+' — '+c.productName);}
          else if(pr>=80){demorados++;lines.push('🟡 #'+c.number+' ('+t.name+'): '+pr+'% · falta '+elpS(restMs)+' — '+c.productName);}
          else{encamino++;lines.push('✅ #'+c.number+' ('+t.name+'): '+pr+'% · falta '+elpS(restMs)+' — '+c.productName);}
        });
        lines.push('');
        lines.push('📊 Resumen: '+listos+' excedidos · '+demorados+' próximos a vencer · '+encamino+' en tiempo normal');
        if(listos)lines.push('💡 Recomendación: revisar los coches excedidos para posible liberación anticipada.');
      }
    }

    // ── LIBRAS / PRODUCCIÓN ──
    if(isLbs){
      lines.push('⚖ ANÁLISIS DE PRODUCCIÓN\n');
      lines.push('En proceso ahora: '+lbsActual.toLocaleString()+' lbs');
      tunnels.forEach(function(t){
        var inT2=coches.filter(function(c){return c.tunnelId===t.id&&c.status==='en-tunel'});
        var lbs2=inT2.reduce(function(a,c){return a+(c.totalLbs||0)},0);
        if(inT2.length)lines.push('  '+t.name+': '+lbs2.toLocaleString()+' lbs ('+inT2.length+' coches)');
      });
      lines.push('');
      var histLbs=history.reduce(function(a,hh){return a+(hh.totalLbs||0)},0);
      lines.push('Historial acumulado: '+histLbs.toLocaleString()+' lbs en '+history.length+' ciclos');
      // Top productos
      var byProd={};history.forEach(function(hh){if(!hh.productName)return;if(!byProd[hh.productName])byProd[hh.productName]={lbs:0,ciclos:0};byProd[hh.productName].lbs+=hh.totalLbs||0;byProd[hh.productName].ciclos++;});
      var prods=Object.keys(byProd).sort(function(a,b){return byProd[b].lbs-byProd[a].lbs});
      if(prods.length){
        lines.push('\n📦 Top por producto:');
        prods.slice(0,5).forEach(function(p){lines.push('  '+p+': '+byProd[p].lbs.toLocaleString()+' lbs · '+byProd[p].ciclos+' ciclos')});
      }
    }

    // ── ALARMAS ──
    if(isAlarma){
      lines.push('🔔 ALARMAS Y ALERTAS\n');
      if(!unack.length){lines.push('✅ No hay alarmas pendientes. Todo en orden.');}
      else{
        lines.push('⚠️ '+unack.length+' alarma(s) pendiente(s):\n');
        var byType={};unack.forEach(function(a){if(!byType[a.type])byType[a.type]=[];byType[a.type].push(a);});
        if(byType['product-ready']){lines.push('✅ LISTOS PARA LIBERAR ('+byType['product-ready'].length+'):');byType['product-ready'].forEach(function(a){lines.push('  '+a.msg)});}
        if(byType['outside-alert']){lines.push('\n⏱ FUERA DEL LÍMITE ('+byType['outside-alert'].length+'):');byType['outside-alert'].forEach(function(a){lines.push('  '+a.msg)});}
        if(byType['temp-check']){lines.push('\n🌡 REVISAR TEMPERATURA ('+byType['temp-check'].length+'):');byType['temp-check'].forEach(function(a){lines.push('  '+a.msg)});}
        lines.push('\n💡 Acción: entra al Dashboard y presiona OK en cada alarma luego de atenderla.');
      }
    }

    // ── HISTORIAL / RENDIMIENTO ──
    if(isHist){
      lines.push('📈 RENDIMIENTO HISTÓRICO\n');
      if(!history.length){lines.push('Sin registros históricos aún.');} 
      else{
        var totalLbsH=history.reduce(function(a,hh){return a+(hh.totalLbs||0)},0);
        var avgMin=history.length>0?(history.reduce(function(a,hh){return a+(hh.outsideMin||0)},0)/history.length).toFixed(0):0;
        lines.push('Total ciclos completados: '+history.length);
        lines.push('Total libras procesadas: '+totalLbsH.toLocaleString()+' lbs');
        lines.push('Promedio tiempo afuera: '+avgMin+'min por coche\n');
        tunnels.forEach(function(t){
          var items=history.filter(function(hh){return hh.tunnelId===t.id});
          if(!items.length)return;
          var avgH=(items.reduce(function(a,hh){return a+(parseFloat(hh.horasEnTunel)||0)},0)/items.length).toFixed(1);
          var lbsT2=items.reduce(function(a,hh){return a+(hh.totalLbs||0)},0);
          var retrasos=items.filter(function(hh){return parseFloat(hh.horasEnTunel)>t.targetTimeHours*1.1}).length;
          var anticip=items.filter(function(hh){return hh.earlyRelease}).length;
          var puntual=Math.round((items.length-retrasos)/items.length*100);
          var icon=puntual>=90?'✅':puntual>=70?'🟡':'🔴';
          lines.push(icon+' '+t.name+':');
          lines.push('  '+items.length+' ciclos · '+lbsT2.toLocaleString()+' lbs · Prom: '+avgH+'h vs obj '+t.targetTimeHours+'h');
          lines.push('  Puntualidad: '+puntual+'% · Retrasos: '+retrasos+' · Anticipados: '+anticip);
        });
        // Por turno
        var byTurno={};history.forEach(function(hh){var sh=hh.shift||'?';if(!byTurno[sh])byTurno[sh]={lbs:0,ciclos:0};byTurno[sh].lbs+=hh.totalLbs||0;byTurno[sh].ciclos++;});
        lines.push('\n📊 Por turno:');
        SHIFTS.forEach(function(s){var d=byTurno[s.id];if(d)lines.push('  '+s.l+': '+d.ciclos+' ciclos · '+d.lbs.toLocaleString()+' lbs')});
      }
    }

    // ── COCHE MÁS TIEMPO AFUERA ──
    if(isAfuera){
      lines.push('⏳ COCHES CON MÁS TIEMPO AFUERA\n');
      var libresT=libresConProd.map(function(c){return Object.assign({},c,{ms:c.productLoadTime?n-c.productLoadTime:0})});
      libresT.sort(function(a,b){return b.ms-a.ms});
      if(!libresT.length){lines.push('No hay coches libres con producto cargado.');}
      else{
        libresT.forEach(function(c){
          var icon=c.ms>=MAX_OUT*60000?'🔴':c.ms>=MAX_OUT*60000*0.7?'🟡':'✅';
          lines.push(icon+' Coche #'+c.number+' — '+c.productName);
          lines.push('  '+elpS(c.ms)+' afuera · '+(c.totalLbs||0).toLocaleString()+' lbs · Límite: '+MAX_OUT+'min');
        });
        var criticos=libresT.filter(function(c){return c.ms>=MAX_OUT*60000});
        if(criticos.length)lines.push('\n💡 '+criticos.length+' coche(s) superaron el límite de '+MAX_OUT+' min. Ingresar a túnel urgente.');
      }
    }

    // ── CAPACIDAD ──
    if(isCapac){
      lines.push('📐 CAPACIDAD DE TÚNELES\n');
      tunnels.forEach(function(t){
        var occ=coches.filter(function(c){return c.tunnelId===t.id&&c.status==='en-tunel'}).length;
        var libre2=t.capacityCoches-occ;
        var icon=libre2===0?'🔴':libre2<=2?'🟡':'🟢';
        lines.push(icon+' '+t.name+': '+occ+'/'+t.capacityCoches+' coches ('+libre2+' lugar'+(libre2!==1?'es':'')+' libre'+(libre2!==1?'s':'')+')');
      });
      lines.push('\nCoches listos para ingresar: '+libresConProd.length+' con producto cargado');
    }

    // ── RECOMENDACIONES ──
    if(isRecomend){
      lines.push('💡 RECOMENDACIONES OPERATIVAS\n');
      var recomendaciones=[];
      // Coches excedidos
      var excedidos=enT.filter(function(c){var t=tunnels.find(function(x){return x.id===c.tunnelId});return t&&(n-c.entryTime)>=t.targetTimeHours*3600000});
      if(excedidos.length)recomendaciones.push('🔴 '+excedidos.length+' coche(s) excedieron tiempo objetivo. Revisar temperatura de producto para liberación anticipada.');
      // Coches afuera mucho tiempo
      var afueraLargo=libresConProd.filter(function(c){return c.productLoadTime&&(n-c.productLoadTime)>=MAX_OUT*60000});
      if(afueraLargo.length)recomendaciones.push('⚠️ '+afueraLargo.length+' coche(s) superaron '+MAX_OUT+'min afuera. Ingresar a túnel inmediatamente.');
      // Túneles con espacio
      tunnels.forEach(function(t){var occ=coches.filter(function(c){return c.tunnelId===t.id&&c.status==='en-tunel'}).length;if(occ<t.capacityCoches&&libresConProd.length>0)recomendaciones.push('✅ '+t.name+' tiene '+(t.capacityCoches-occ)+' lugar(es) libre(s). Hay '+libresConProd.length+' coche(s) listo(s) para ingresar.')});
      // Temperaturas sin revisar
      tunnels.forEach(function(t){var inT2=coches.filter(function(c){return c.tunnelId===t.id&&c.status==='en-tunel'});if(!inT2.length)return;var last=tLogs.filter(function(l){return l.tunnelId===t.id}).sort(function(a,b){return b.timestamp-a.timestamp})[0];var since=last?n-last.timestamp:n-(inT2[0].entryTime||n);if(since>=t.checkIntervalMin*60000)recomendaciones.push('🌡 '+t.name+' lleva '+elpS(since)+' sin registro de temperatura. Registrar urgente.')});
      // Alarmas sin atender
      if(unack.length>3)recomendaciones.push('🔔 Hay '+unack.length+' alarmas sin atender. Revisar el panel de alarmas.');
      if(!recomendaciones.length)recomendaciones.push('✅ Todo parece estar en orden. Operación normal.');
      recomendaciones.forEach(function(r){lines.push(r)});
    }

    lines.push('\n─────────────────────────────────────');
    lines.push('⚡ Análisis local · Sin API · Datos en tiempo real');
    return lines.join('\n');
  }
